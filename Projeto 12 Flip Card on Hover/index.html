<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Flip Card on Hover</title>
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/5.15.2/css/all.min.css" />
</head>
<body>
    <div class="wrapper">
        <div class="card front-face">
            <img src="img/Ultrakill.png" alt="">
        </div>
        <div class="card back-face">
            <img src="img/Ultrakill.png" alt="">
            <div class="info">
                <div class="title">V1</div>
                <p>V1 é um personagem do jogo ULTRAKILL, onde ele é descrito como uma Máquina Suprema abandonada <br>à própria sorte na Terra após a extinção da humanidade </p>
            </div>
            <ul>
                <li><a href="#"><i class="fab fa-facebook-f"></i></a></li>
                <li><a href="#"><i class="fab fa-twitter"></i></a></li>
                <li><a href="#"><i class="fab fa-instagram"></i></a></li>
                <li><a href="#"><i class="fab fa-youtube"></i></a></li>
            </ul>
        </div>
    </div>
</body>
</html>
